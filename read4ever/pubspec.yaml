name: read4ever
description: "Turn scattered docs and guides into structured, trackable learning units."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # WebView
  flutter_inappwebview: ^6.1.5

  # Database
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Data classes
  freezed_annotation: ^2.4.4

  # Fonts
  google_fonts: ^6.2.1

  # HTTP + XML
  http: ^1.2.2
  xml: ^6.5.0

  # Persistence
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  path: ^1.9.0

  # Share intent
  flutter_sharing_intent: ^2.0.0+5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.12
  drift_dev: ^2.20.0
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/js/
